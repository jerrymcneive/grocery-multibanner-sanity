name: Multi-Banner Theme Verify

on:
  pull_request:
    paths:
      - 'src/theme/**'

jobs:
  verify:
    strategy:
      matrix:
        banner: [festival-foods, hometown-grocers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run theme:verify --banner=${{ matrix.banner }}
